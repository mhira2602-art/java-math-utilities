<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Hub</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            --text: #1f2937;
            --card: #ffffff;
            --accent: #0f766e;
            --accent-dark: #115e59;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .panel {
            width: min(760px, 100%);
            background: var(--card);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 3vw, 2.4rem);
        }
        p {
            margin: 0 0 20px;
            color: var(--muted);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 14px;
        }
        a.card {
            text-decoration: none;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px;
            color: var(--text);
            transition: transform .15s ease, box-shadow .15s ease;
        }
        a.card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.15);
            border-color: #99f6e4;
        }
        a.card strong {
            display: block;
            margin-bottom: 6px;
            color: var(--accent-dark);
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>Math Practice Hub</h1>
    <p>Select a module to enter inputs in browser and get instant results.</p>
    <div class="grid">
        <a class="card" th:href="@{/calculator}">
            <strong>Calculator</strong>
            Add, subtract, multiply, divide
        </a>
        <a class="card" th:href="@{/factorial}">
            <strong>Factorial</strong>
            Calculate factorial of any non-negative integer
        </a>
        <a class="card" th:href="@{/prime}">
            <strong>Prime Check</strong>
            Test if a number is prime
        </a>
        <a class="card" th:href="@{/array}">
            <strong>Array Functions</strong>
            Sum, max, min, average on comma-separated list
        </a>
    </div>
</div>
</body>
</html>
